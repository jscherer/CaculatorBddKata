<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 24px;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.6em;
      transition: color 0.2s;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1e3a5f;
      transform: scale(1.04);
    }

    .cell.x { color: #5ba4cf; }
    .cell.o { color: #e07b54; }
    .cell.taken { cursor: default; }

    .cell.winner {
      background: #2d4a1e;
      border-color: #f0c040;
      color: #f0c040;
    }

    #reset {
      margin-top: 28px;
      padding: 10px 32px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      background: #0f3460;
      color: #eee;
      border: 2px solid #5ba4cf;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #1a4f8a;
      transform: scale(1.05);
    }

    #board.done .cell { cursor: default; }
    #board.done .cell:hover { background: #16213e; transform: none; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status"></div>
  <div id="board"></div>
  <button id="reset" onclick="resetGame()">New Game</button>

  <script>
    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, currentPlayer, gameOver;

    function initGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
    }

    function renderBoard(winCells = []) {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' +
          (val ? ' taken ' + val.toLowerCase() : '') +
          (winCells.includes(i) ? ' winner' : '');
        cell.textContent = val || '';
        if (!val && !gameOver) cell.onclick = () => handleClick(i);
        el.appendChild(cell);
      });
    }

    function setStatus(msg, color) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || '#eee';
    }

    function handleClick(i) {
      if (board[i] || gameOver) return;
      board[i] = currentPlayer;

      const winLine = checkWinner();
      if (winLine) {
        gameOver = true;
        document.getElementById('board').classList.add('done');
        renderBoard(winLine);
        setStatus(`Player ${currentPlayer} wins!`, '#f0c040');
        return;
      }

      if (board.every(v => v)) {
        gameOver = true;
        document.getElementById('board').classList.add('done');
        renderBoard();
        setStatus("It's a draw!", '#aaa');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      renderBoard();
      setStatus(`Player ${currentPlayer}'s turn`, currentPlayer === 'X' ? '#5ba4cf' : '#e07b54');
    }

    function checkWinner() {
      for (const [a, b, c] of WIN_LINES) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function resetGame() {
      initGame();
      document.getElementById('board').classList.remove('done');
      renderBoard();
      setStatus("Player X's turn", '#5ba4cf');
    }

    resetGame();
  </script>
</body>
</html>
